name: Bump core pin (on ManifoldKit release)

# Fans a ManifoldKit release out into this companion automatically.
#
# Trigger: ManifoldKit's release-please workflow fires repository_dispatch
# of type `core-release` (payload.tag = the new core tag) on every release.
# workflow_dispatch is provided for manual runs and for catching this repo
# up to a release that shipped before the workflow existed.
#
# This is a thin caller shim: the `resolve` job strips the leading "v" from
# whichever trigger supplied the tag, then `bump` invokes the org-shared
# `companion-core-bump.yml` reusable workflow (ManifoldKit/.github), which
# does the actual pin rewrite, gate, and PAT-authored merge that trips
# release-please. See that repo's WORKFLOWS.md for the full behavior and
# the RELEASE_AUTOMERGE_TOKEN secret requirement.

on:
  repository_dispatch:
    types: [core-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "ManifoldKit tag to pin to (e.g. v0.63.0)"
        required: true
        type: string

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - id: tag
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${DISPATCH_TAG:-$INPUT_TAG}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  bump:
    needs: resolve
    uses: ManifoldKit/.github/.github/workflows/companion-core-bump.yml@main
    permissions:
      contents: write
      pull-requests: write
    with:
      version: ${{ needs.resolve.outputs.version }}
      pin-mode: upToNextMinor
    secrets: inherit
