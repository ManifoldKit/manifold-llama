name: Canary (core main)

# Builds + tests THIS repo against ManifoldKit/ManifoldKit's main HEAD (NOT
# the latest published tag) to catch a core seam move before it ships. A
# failure means the core seam moved — not that this repo regressed.
#
# Thin caller shim: all step-level logic (checkout, toolchain select,
# `swift package edit` against the core checkout, build, test) lives in the
# org-shared `companion-canary.yml` reusable workflow (ManifoldKit/.github).
# See that repo's WORKFLOWS.md for the full behavior.

on:
  schedule:
    - cron: "17 4 * * *"   # nightly, 04:17 UTC (quiet hour)
  workflow_dispatch:
  repository_dispatch:
    types: [core-release]

jobs:
  canary:
    uses: ManifoldKit/.github/.github/workflows/companion-canary.yml@main
