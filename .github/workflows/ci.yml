name: CI

on:
  # Skip the heavy macOS build+test on docs/version-only changes — notably
  # release-please PRs and their merge commits, which touch only CHANGELOG.md
  # and .release-please-manifest.json. `test` is a required check, so a skipped
  # release PR stays BLOCKED and must be admin-merged (gh api PUT .../merge) —
  # which is already the release flow (Highlights rewrite is hand-merged). Any
  # PR touching Sources/Package/etc. is unaffected and still runs the gate.
  #
  # `types:` is load-bearing: the shared swift-ci.yml reusable workflow skips
  # draft PRs, and a skipped job counts as passing for branch protection. The
  # bare `pull_request:` default types (opened, synchronize, reopened) don't
  # include `ready_for_review`, so a PR opened as draft and later marked ready
  # would fire no event this workflow subscribes to — it would become
  # mergeable with CI never having actually run. See
  # ManifoldKit/.github WORKFLOWS.md.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Not covered by the shared swift-ci.yml (build+test only) — kept as its
  # own job here rather than folded into the reusable workflow. Runs on
  # macos-15 with no Xcode toolchain selection: the script is network-only
  # (raw.githubusercontent.com) and is written to stay macOS /bin/bash 3.2
  # compatible, matching where it ran before this migration.
  scenario-override-sync:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Check scenario-override sync
        # Detects orphaned entries in Sources/manifold-tools-llama/ScenarioOverrides
        # (an override whose id no longer exists in ManifoldKit core's bundled
        # corpus at the resolved pin — scripts/check-vendored-sync.sh). Hard-fails
        # (--strict, the script's default) on a real orphan; network failures
        # still exit 0 (advisory only when connectivity itself is the problem,
        # not when the check actually ran).
        run: scripts/check-vendored-sync.sh

  # Required status check context becomes "test / build-and-test" (reusable
  # workflow calls report as "<caller job id> / <called job id>") — see the
  # "Required-check rename needed" note in the PR body. Job id kept as `test`
  # (matching the pre-migration required context name) to stay as close as
  # possible to the current required check.
  test:
    uses: ManifoldKit/.github/.github/workflows/swift-ci.yml@main
