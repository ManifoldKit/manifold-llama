name: CI

on:
  # Skip the heavy macOS build+test on docs/version-only changes — notably
  # release-please PRs and their merge commits, which touch only CHANGELOG.md
  # and .release-please-manifest.json. `test` is a required check, so a skipped
  # release PR stays BLOCKED and must be admin-merged (gh api PUT .../merge) —
  # which is already the release flow (Highlights rewrite is hand-merged). Any
  # PR touching Sources/Package/etc. is unaffected and still runs the gate.
  pull_request:
    paths-ignore:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Check scenario-override sync
        # Detects orphaned entries in Sources/manifold-tools-llama/ScenarioOverrides
        # (an override whose id no longer exists in ManifoldKit core's bundled
        # corpus at the resolved pin — scripts/check-vendored-sync.sh). Needs no
        # build — network-only against raw.githubusercontent.com — so it runs
        # before toolchain selection. Hard-fails (--strict, the script's default)
        # on a real orphan; network failures still exit 0 (advisory only when
        # connectivity itself is the problem, not when the check actually ran).
        run: scripts/check-vendored-sync.sh
        continue-on-error: true
      - name: Select newest Xcode 26 toolchain
        # The image default (Xcode 16.4 / Swift 6.1) mis-resolves the
        # dependency graph: its SwiftPM does not prune AnyLanguageModel's
        # trait-disabled mlx-swift-lm 2.x edge inside core, producing a bogus
        # "could not be resolved" conflict with mlx-swift-lm 3.x. Swift 6.3
        # (Xcode 26.3) prunes it correctly — same toolchain as the local gate.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer"
          swift --version
      - name: Cache SwiftPM dependency material
        uses: actions/cache@v4
        with:
          # Dependency material only (clones, registries, prebuilt binary
          # artifacts — for manifold-llama the big win is the cached checkout of the
          # heavy ML dependency tree). Own-module .build/debug objects are
          # deliberately NOT cached: SwiftPM embeds absolute paths in module
          # fingerprints, so restored objects go stale on miss (same lesson
          # as core's ci.yml).
          path: |
            ~/.swiftpm
            .build/artifacts
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-
      - name: Build
        run: swift build
      - name: Test
        # NO --parallel: ManifoldBackendTestKit's BackendContractChecks claims
        # registry is process-global; explicit parallelism interleaves backend
        # test classes and races it.
        run: swift test
