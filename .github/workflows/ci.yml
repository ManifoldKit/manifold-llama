name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode 26 toolchain
        # The image default (Xcode 16.4 / Swift 6.1) mis-resolves the
        # dependency graph: its SwiftPM does not prune AnyLanguageModel's
        # trait-disabled mlx-swift-lm 2.x edge inside core, producing a bogus
        # "could not be resolved" conflict with mlx-swift-lm 3.x. Swift 6.3
        # (Xcode 26.3) prunes it correctly — same toolchain as the local gate.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer"
          swift --version
      - name: Cache SwiftPM dependency material
        uses: actions/cache@v4
        with:
          # Dependency material only (clones, registries, prebuilt binary
          # artifacts — for manifold-llama the big win is the cached checkout of the
          # heavy ML dependency tree). Own-module .build/debug objects are
          # deliberately NOT cached: SwiftPM embeds absolute paths in module
          # fingerprints, so restored objects go stale on miss (same lesson
          # as core's ci.yml).
          path: |
            ~/.swiftpm
            .build/artifacts
            .build/checkouts
            .build/repositories
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-
      - name: Build
        run: swift build
      - name: Test
        # NO --parallel: ManifoldBackendTestKit's BackendContractChecks claims
        # registry is process-global; explicit parallelism interleaves backend
        # test classes and races it.
        run: swift test
