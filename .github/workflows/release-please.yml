name: Release Please

# Thin caller shim: the actual googleapis/release-please-action invocation
# lives in the org-shared `companion-release-please.yml` reusable workflow
# (ManifoldKit/.github). See that repo's WORKFLOWS.md for why the
# permissions block below is required (it caps the action's GITHUB_TOKEN,
# not just documentation).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-please:
    uses: ManifoldKit/.github/.github/workflows/companion-release-please.yml@main
    permissions:
      contents: write
      pull-requests: write
